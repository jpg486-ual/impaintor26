spring:
  datasource:
    url: jdbc:h2:mem:impaintor;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# JWT compartido por Track A (JwtService) y Track D (JwtTokenValidator) en tests.
jwt:
  secret: test-secret-test-secret-test-secret-test-secret-test
  expiration-ms: 3600000

impaintor:
  realtime:
    broker:
      mode: simple
    jwt:
      secret: ${jwt.secret}
      issuer: impaintor-test
    websocket:
      endpoint: /ws
      allowed-origins: "*"
