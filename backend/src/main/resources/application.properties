spring.application.name=impaintor
server.servlet.context-path=/api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/impaintor}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
app.debug-errors=${APP_DEBUG_ERRORS:false}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}
logging.level.org.springframework.web.socket=${APP_WS_LOG_LEVEL:INFO}
logging.level.org.springframework.messaging.simp.stomp=${APP_WS_LOG_LEVEL:INFO}
logging.level.org.springframework.web.socket.sockjs=${APP_WS_LOG_LEVEL:INFO}
app.ws.broker.relay-enabled=${APP_WS_BROKER_RELAY_ENABLED:false}
app.ws.broker.relay-host=${APP_WS_BROKER_RELAY_HOST:localhost}
app.ws.broker.relay-port=${APP_WS_BROKER_RELAY_PORT:61613}
app.ws.broker.client-login=${APP_WS_BROKER_CLIENT_LOGIN:guest}
app.ws.broker.client-passcode=${APP_WS_BROKER_CLIENT_PASSCODE:guest}
app.ws.broker.system-login=${APP_WS_BROKER_SYSTEM_LOGIN:guest}
app.ws.broker.system-passcode=${APP_WS_BROKER_SYSTEM_PASSCODE:guest}
app.ws.broker.virtual-host=${APP_WS_BROKER_VIRTUAL_HOST:/}

spring.websocket.path=/ws

app.impostor-hints.enabled=${APP_IMPOSTOR_HINTS_ENABLED:true}
app.impostor-hints.datamuse-base-url=${APP_IMPOSTOR_HINTS_DATAMUSE_BASE_URL:https://api.datamuse.com}
app.impostor-hints.timeout-millis=${APP_IMPOSTOR_HINTS_TIMEOUT_MILLIS:1200}
app.impostor-hints.max-results=${APP_IMPOSTOR_HINTS_MAX_RESULTS:3}
