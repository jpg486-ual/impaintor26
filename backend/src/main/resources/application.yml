spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/impaintordb}
    username: ${SPRING_DATASOURCE_USERNAME:impaintor}
    password: ${SPRING_DATASOURCE_PASSWORD:impaintor_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8080}

# Configuración JWT compartida por Track A (JwtService) y Track D (JwtTokenValidator)
# para garantizar que firman/validan con la misma clave.
jwt:
  secret: ${IMPAINTOR_JWT_SECRET:dev-secret-change-me-dev-secret-change-me-dev-secret}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h por defecto

impaintor:
  realtime:
    broker:
      mode: ${REALTIME_BROKER_MODE:relay}        # relay | simple
      relay-host: ${SPRING_RABBITMQ_HOST:localhost}
      relay-port: ${REALTIME_RELAY_PORT:61613}    # STOMP port on RabbitMQ
      relay-login: ${SPRING_RABBITMQ_USERNAME:guest}
      relay-passcode: ${SPRING_RABBITMQ_PASSWORD:guest}
    jwt:
      # Reutiliza el mismo secret raíz que Track A para que ambos firmen/validen igual.
      secret: ${jwt.secret}
      issuer: impaintor
    websocket:
      endpoint: /ws
      allowed-origins: ${REALTIME_ALLOWED_ORIGINS:http://localhost:4200,http://frontend}
