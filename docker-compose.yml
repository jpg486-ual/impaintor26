services:
  db:
    image: postgres:16-alpine
    container_name: impaintor-db
    environment:
      POSTGRES_DB: impaintor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d impaintor"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    container_name: impaintor-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
    volumes:
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: impaintor-backend
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/impaintor
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_WS_BROKER_RELAY_ENABLED: "true"
      APP_WS_BROKER_RELAY_HOST: rabbitmq
      APP_WS_BROKER_RELAY_PORT: "61613"
      APP_WS_BROKER_CLIENT_LOGIN: guest
      APP_WS_BROKER_CLIENT_PASSCODE: guest
      APP_WS_BROKER_SYSTEM_LOGIN: guest
      APP_WS_BROKER_SYSTEM_PASSCODE: guest
      APP_WS_BROKER_VIRTUAL_HOST: /
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: impaintor-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  db_data:
