<div class="reset-page">
  <div class="reset-container">

    <div class="cat-wrapper">
      <img src="images/login/cat-lying.png" alt="Gato tumbado" class="cat-lying">
    </div>

    <div class="frame-wrapper">
      <img src="images/login/register-frame.png" alt="Marco" class="reset-frame">

      <div class="form-card">
        <p class="description-text">
          Crea una nueva contrasena para tu cuenta.
        </p>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="reset-form">
          <div class="form-group">
            <label for="password" class="form-label">NUEVA CONTRASENA</label>
            <input type="password" id="password" formControlName="password" placeholder="••••••••" class="form-input">
            <span class="error-message"
              *ngIf="password?.touched && password?.hasError('required')">
              La contrasena es requerida
            </span>
            <span class="error-message"
              *ngIf="password?.touched && password?.hasError('minlength')">
              Minimo 6 caracteres
            </span>
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="form-label">CONFIRMAR CONTRASENA</label>
            <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="••••••••" class="form-input">
            <span class="error-message"
              *ngIf="confirmPassword?.touched && confirmPassword?.hasError('required')">
              Confirma la contrasena
            </span>
            <span class="error-message"
              *ngIf="resetForm?.touched && resetForm?.hasError('passwordMismatch')">
              Las contrasenas no coinciden
            </span>
          </div>

          <button type="submit" class="btn btn-submit" [disabled]="resetForm.invalid || isLoading">
            {{ isLoading ? 'Actualizando...' : 'Restablecer contrasena' }}
          </button>

          <div class="error-alert" *ngIf="errorMessage">
            <p>{{ errorMessage }}</p>
          </div>

          <div class="success-alert" *ngIf="successMessage">
            <p>{{ successMessage }}</p>
          </div>

          <div class="links-section">
            <button type="button" (click)="goToLogin()" class="btn-text-link">
              Volver a Iniciar sesion
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
